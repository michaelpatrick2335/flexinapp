<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>You're In — Download Flexin</title>
<meta name="description" content="Welcome to Flexin. Download the app to start meditating with your tribe." />
<link rel="icon" href="/flexin_icon_192.png" />
<style>
  :root {
    --gold: #f5c842;
    --saffron: #e8952a;
    --midnight: #0d0f1a;
    --ink: #ffffff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--midnight);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .stars {
    position: fixed; inset: 0;
    background:
      radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1.5px 1.5px at 70% 60%, rgba(255,255,255,0.45), transparent),
      radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.5), transparent),
      radial-gradient(2px 2px at 85% 20%, rgba(245,200,66,0.4), transparent);
    pointer-events: none;
    z-index: 0;
  }
  .wrap {
    position: relative; z-index: 1;
    max-width: 460px;
    margin: 0 auto;
    padding: 56px 24px 48px;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  .brand {
    display: flex; justify-content: center;
    margin-bottom: 28px;
  }
  .brand img {
    width: 88px; height: 88px; border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 0 0 3px rgba(245,200,66,0.4), 0 0 48px rgba(245,200,66,0.35);
  }
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(245,200,66,0.22);
    border-radius: 24px;
    padding: 32px 22px;
    backdrop-filter: blur(12px);
    text-align: center;
    box-shadow: 0 0 60px rgba(245,200,66,0.06);
  }
  .check {
    width: 56px; height: 56px;
    margin: 0 auto 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--saffron));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 32px rgba(245,200,66,0.4);
  }
  .check svg { width: 30px; height: 30px; color: #1a1408; }
  h1 {
    font-size: 28px;
    line-height: 1.2;
    margin: 0 0 10px;
    font-weight: 700;
  }
  .sub {
    color: rgba(255,255,255,0.7);
    font-size: 15px; line-height: 1.5;
    margin: 0 0 24px;
  }
  .email-pill {
    display: inline-block;
    margin-top: 8px; padding: 8px 14px;
    background: rgba(245,200,66,0.08);
    border: 1px solid rgba(245,200,66,0.25);
    border-radius: 999px;
    font-size: 13px;
    color: var(--gold);
    font-weight: 600;
  }
  .steps {
    margin-top: 26px;
    text-align: left;
    background: rgba(13,15,26,0.5);
    border-radius: 16px;
    padding: 20px;
  }
  .step {
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 14px;
  }
  .step:last-child { margin-bottom: 0; }
  .step-num {
    flex: 0 0 24px; height: 24px;
    border-radius: 50%;
    background: var(--gold);
    color: #1a1408;
    font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .step-text {
    font-size: 14px; line-height: 1.5;
    color: rgba(255,255,255,0.85);
  }
  .step-text strong { color: var(--gold); }
  .cta {
    margin-top: 24px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .btn {
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
    border-radius: 14px;
    font-size: 16px; font-weight: 700;
    text-decoration: none;
    border: none; cursor: pointer;
    transition: transform 150ms ease;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold) 0%, var(--saffron) 100%);
    color: #1a1408;
    box-shadow: 0 8px 24px rgba(245,200,66,0.25);
  }
  .footer {
    margin-top: auto; padding-top: 32px;
    text-align: center; font-size: 12px;
    color: rgba(255,255,255,0.45);
  }
  .footer a { color: rgba(255,255,255,0.7); text-decoration: none; }
  .pulse {
    margin-top: 10px;
    font-size: 12px; color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>
  <div class="stars"></div>
  <main class="wrap">
    <div class="brand">
      <img src="/flexin_circle.jpeg" alt="Flexin" />
    </div>

    <div class="card">
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6L9 17l-5-5"/>
        </svg>
      </div>
      <h1>You're in</h1>
      <p class="sub">Payment confirmed. Your account is ready.</p>
      <div class="email-pill" id="email-pill">—</div>

      <div class="steps">
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-text">Download <strong>Flexin</strong> from the App Store on your iPhone.</div>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <div class="step-text">Open the app and sign in with this same email.</div>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <div class="step-text">You'll land directly in your <strong>tribe</strong>.</div>
        </div>
      </div>

      <div class="cta">
        <a class="btn btn-primary" href="https://apps.apple.com/app/id6780059108">Download on the App Store</a>
      </div>

      <p class="pulse">Need help? <a href="/support" style="color: rgba(245,200,66,0.7);">Contact support</a></p>
    </div>

    <div class="footer">
      © Flexin Labs · <a href="/privacy">Privacy</a> · <a href="/terms">Terms</a>
    </div>
  </main>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var email = (params.get("email") || "").toLowerCase();
  var joinCode = (params.get("join") || "").toUpperCase();

  if (email) {
    document.getElementById("email-pill").textContent = email;
  } else {
    document.getElementById("email-pill").style.display = "none";
  }

  // Flip the user to premium on the backend (no webhook in place — this is
  // the callback Stripe redirects to after successful checkout). Idempotent.
  if (email) {
    fetch("/api/unlock", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-user-email": email },
      body: JSON.stringify({ email: email }),
    }).catch(function() {});
  }

  // Belt + suspenders: also stash the join code in localStorage AND clipboard
  // so even if the user somehow loses their email, the code survives.
  if (/^[A-Z0-9]{4,10}$/.test(joinCode)) {
    try { localStorage.setItem("flexin_pending_join_code", joinCode); } catch(e) {}
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText("FLEXIN-TRIBE:" + joinCode).catch(function(){});
      }
    } catch(e) {}
  }
})();
</script>
</body>
</html>
