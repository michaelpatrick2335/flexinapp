<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Lock the viewport so iOS WebView (Capacitor) doesn't pinch-zoom or
         text-zoom. user-scalable=no + maximum-scale=1 prevent the accidental
         zoom-in we were seeing in TestFlight where the user couldn't zoom
         back out. viewport-fit=cover ensures safe-area insets are correct. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0f1a" />
    <style>
      html, body {
        /* Stop iOS Safari/WebView from auto-bumping text size on rotation
           or accessibility settings. Combined with the locked viewport,
           this gives us a stable, non-zoomable layout. */
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        /* Disable double-tap zoom while still allowing taps to register
           quickly (no 300ms delay). */
        touch-action: manipulation;
        /* Solid dark background applied immediately so the iOS LaunchScreen
           hand-off to the WebView never flashes white before React mounts. */
        background-color: #0d0f1a;
        color: #ffffff;
      }
      #root { background-color: #0d0f1a; min-height: 100dvh; }
      body {
        /* Disable the long-press text-selection callout on iOS so the app
           feels native, and prevent text selection on chrome elements. */
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Flexin — Train. Track. Transform.</title>
    <meta name="description" content="Squad-powered fitness. Track your transformation, lift with your crew, level up every week." />

    <!-- Fonts: Chillax (display) + General Sans (body) from Fontshare -->
    <link
      href="https://api.fontshare.com/v2/css?f[]=chillax@300,400,500,600,700&f[]=general-sans@300,400,500,600,700&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>💪</text></svg>" />

    <!-- PWA -->
    <link rel="manifest" href="/app/manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://www.flexinapp.com/app/flexin_icon_512.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="https://www.flexinapp.com/app/flexin_icon_512.png" />
    <meta name="apple-mobile-web-app-title" content="Flexin" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/app/sw.js', { scope: '/app/' });
      }
    </script>
  </body>
</html>
